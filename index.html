<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿瓦隆向外累積主持板</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: "微軟正黑體", sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; color: #333; margin-bottom: 100px;}
        button { padding: 10px 15px; margin: 4px; font-size: 14px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        
        /* 玩家狀態按鈕 */
        .btn-cap { background-color: #e2e3e5; color: #666; }
        .btn-cap.active { background-color: #ffc107; color: #212529; box-shadow: 0 0 10px #ffc107; transform: scale(1.1); }
        .btn-mission { background-color: #e2e3e5; color: #666; }
        .btn-mission.active { background-color: #6f42c1; color: white; box-shadow: 0 0 10px #6f42c1; transform: scale(1.1); }
        .btn-view { background-color: #17a2b8; color: white; }
        .btn-disabled { background-color: #ced4da !important; color: #6c757d !important; cursor: not-allowed !important; box-shadow: none !important;}
        
        .btn-vote { min-width: 90px; }
        .vote-approve { background-color: #28a745; color: white; box-shadow: 0 0 8px #28a745;}
        .vote-reject { background-color: #dc3545; color: white; }
        .btn-delete { background-color: transparent; color: #dc3545; font-size: 20px; padding: 5px; margin-right: 10px; }
        .btn-delete:hover { background-color: #ffdddd; border-radius: 50%; }

        .primary { background-color: #007bff; color: white; }
        .success { background-color: #28a745; color: white; }
        .danger { background-color: #dc3545; color: white; }
        .secondary { background-color: #6c757d; color: white; }

        /* 彈窗樣式 */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: white; padding: 25px; border-radius: 15px; text-align: center; max-width: 90%; width: 500px; overflow-y: auto; max-height: 90vh; }
        
        /* 角色選擇按鈕樣式 */
        .role-btn { width: 140px; border: 2px solid #ddd; background: #fff; margin-bottom: 5px; }
        .role-btn.selected { border-color: #007bff; background: #e7f1ff; }
        .role-good { color: #0056b3; }
        .role-evil { color: #c82333; }

        .player-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 10px; border-bottom: 1px solid #ddd; background: white; 
            margin-bottom: 8px; border-radius: 8px; max-width: 850px; 
            margin-left: auto; margin-right: auto; 
            cursor: grab;
            transition: box-shadow 0.2s;
        }
        .player-item:active { cursor: grabbing; }
        .player-name { font-weight: bold; font-size: 18px; flex-grow: 1; text-align: left; padding-left: 10px;}
        
        .role-group { border: 1px solid #eee; padding: 10px; margin: 10px 0; border-radius: 10px; }
        .role-group h3 { margin-top: 0; }

        /* 歷史表格固定排版 */
        .quest-table-container { margin: 20px auto; max-width: 95%; background: white; padding: 10px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow-x: auto;}
        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; font-size: 14px; min-width: 600px; table-layout: fixed; }
        th, td { border: 1px solid #dee2e6; padding: 8px 4px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { background-color: #343a40; color: white; }
        th:nth-child(1), td:nth-child(1) { width: 50px; } 
        th:nth-child(2), td:nth-child(2) { width: 60px; } 
        
        .mission-summary-bar { background: #e9ecef; padding: 10px; margin: 10px 0; border-radius: 5px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .icon-success { color: #28a745; font-size: 24px; }
        .icon-fail { color: #dc3545; font-size: 24px; }
    </style>
</head>
<body>

    <h1>🏰 阿瓦隆向外累積紀錄板</h1>

    <div id="add-player-section" style="margin-bottom: 20px;">
        <input type="text" id="newPlayerName" placeholder="玩家名稱" style="padding:12px; border:1px solid #ccc; border-radius:5px; width:150px;">
        <button id="addPlayerBtn" onclick="addPlayer()" class="primary">➕ 新增</button>
        <button id="toggleGameBtn" onclick="openRoleModal()" class="success" style="margin-left: 15px;">🚀 遊戲開始</button>
        <button id="setupLadyBtn" onclick="openInitialLadyModal()" class="primary" style="margin-left: 15px; display: none;">設定首位湖中女神</button>
    </div>

    <div id="player-list"></div>
    <div style="margin: 20px auto; max-width: 850px;">
        <button class="primary" onclick="submitRound()" style="font-size: 20px; padding: 15px; width: 100%;">✅ 紀錄提議投票結果</button>
    </div>

    <div id="role-modal" class="overlay">
        <div class="modal-box">
            <h2>🎭 選擇遊戲角色</h2>
            <p>需選擇 <span id="needed-count">0</span> 個角色 (當前已選: <span id="selected-count">0</span>)</p>
            <div id="role-selection-area">
                <div class="role-group" style="background:#e7f1ff;">
                    <h3 class="role-good">好人 (<span id="good-needed">0</span>)</h3>
                    <button class="role-btn role-good selected" id="role-merlin" disabled>梅林 (必選)</button>
                    <button class="role-btn role-good" onclick="toggleRole('派西維爾')">派西維爾</button>
                    <div id="servant-area"></div>
                </div>
                <div class="role-group" style="background:#f8d7da;">
                    <h3 class="role-evil">壞人 (<span id="evil-needed">0</span>)</h3>
                    <button class="role-btn role-evil selected" id="role-assassin" disabled>刺客 (必選)</button>
                    <button class="role-btn role-evil" onclick="toggleRole('莫甘娜')">莫甘娜</button>
                    <button class="role-btn role-evil" onclick="toggleRole('莫德雷德')">莫德雷德</button>
                    <button class="role-btn role-evil" onclick="toggleRole('奧伯倫')">奧伯倫</button>
                    <div id="minion-area"></div>
                </div>
            </div>
            <button class="success" onclick="confirmRoles()" id="confirm-roles-btn" style="padding: 10px 30px; font-size: 16px;">確認分配</button>
            <button class="secondary" onclick="closeRoleModal()" style="padding: 10px 30px; font-size: 16px;">取消</button>
        </div>
    </div>

    <div id="view-role-modal" class="overlay">
        <div class="modal-box">
            <h2 id="view-name">玩家</h2>
            <h1 id="view-role" style="color: #007bff; font-size: 48px; margin: 20px 0;">角色名</h1>
            <p id="view-info" style="background: #eee; padding: 15px; border-radius: 8px; font-size: 18px;">資訊內容</p>
            <button class="primary" onclick="closeViewModal()" style="font-size: 18px; padding: 10px 40px;">我已確認</button>
        </div>
    </div>

    <div id="personal-mission-modal" class="overlay">
        <div class="modal-box">
            <h2 id="pm-name" style="font-size: 28px; color: #007bff;">玩家名</h2>
            <h3 style="margin-bottom: 20px;">請選擇出任務結果</h3>
            <div style="display:flex; justify-content:center; gap:20px; margin: 20px 0;">
                <button id="pm-success-btn" style="background:#28a745; color:white; padding: 20px 40px; font-size: 24px; border:2px solid transparent; border-radius:10px;" onclick="selectPersonalVote('成功')">成功</button>
                <button id="pm-fail-btn" style="background:#dc3545; color:white; padding: 20px 40px; font-size: 24px; border:2px solid transparent; border-radius:10px;" onclick="selectPersonalVote('失敗')">失敗</button>
            </div>
            <div id="pm-selection-text" style="font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #666;">尚未選擇</div>
            <button class="primary" onclick="submitPersonalVote()" style="font-size: 20px; padding: 15px 50px;">確認送出</button>
        </div>
    </div>

    <div id="mission-result-modal" class="overlay" style="z-index: 2000;">
        <div class="modal-box" id="mission-result-box" style="background: rgba(255,255,255,0.95); transition: 0.3s;">
            <h1 id="mission-result-title" style="font-size: 50px; margin-bottom: 10px;"></h1>
            <p id="mission-result-desc" style="font-size: 24px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="assassination-modal" class="overlay">
        <div class="modal-box">
            <h2>🗡️ 進入刺殺階段</h2>
            <div id="evil-info" style="margin-bottom: 15px; color: #dc3545; font-weight: bold; background: #f8d7da; padding: 10px; border-radius: 5px;"></div>
            <p>請選擇你要刺殺的好人 (只能選一個)：</p>
            <div id="good-targets" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;"></div>
            <br>
            <button class="danger" onclick="confirmAssassination()" style="margin-top: 20px; padding: 10px 30px; font-size: 18px;">確認刺殺</button>
            <button class="secondary" onclick="closeAssassinationModal()" style="margin-top: 20px; padding: 10px 30px; font-size: 18px;">取消</button>
        </div>
    </div>

    <div id="initial-lady-modal" class="overlay" style="z-index: 1500;">
        <div class="modal-box">
            <h2>選擇首位湖中女神</h2>
            <p>請點擊選取一位玩家擔任首位湖中女神：</p>
            <div id="initial-lady-options" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px;"></div>
            <br>
            <button class="primary" onclick="confirmInitialLady()" style="margin-top: 20px; padding: 10px 30px; font-size: 16px;">確認</button>
            <button class="secondary" onclick="closeInitialLadyModal()" style="margin-top: 20px; padding: 10px 30px; font-size: 16px;">取消</button>
        </div>
    </div>

    <div id="lady-modal" class="overlay" style="z-index: 1500;">
        <div class="modal-box">
            <h2>湖中女神驗人</h2>
            <p>請選擇你要查驗陣營的玩家：</p>
            <div id="lady-target-options" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px;"></div>
            <br>
            <button class="primary" id="confirm-lady-btn" style="margin-top: 20px; padding: 10px 30px; font-size: 16px;">確認</button>
            <button class="secondary" onclick="closeLadyModal()" style="margin-top: 20px; padding: 10px 30px; font-size: 16px;">取消</button>
        </div>
    </div>

    <div id="lady-result-modal" class="overlay" style="z-index: 1600;">
        <div class="modal-box">
            <h2>驗人結果</h2>
            <p style="font-size: 20px;">玩家 <b id="lady-result-target"></b> 的陣營是：</p>
            <h1 id="lady-result-alignment" style="font-size: 40px; margin: 20px 0; color: #333;"></h1>
            <button class="primary" onclick="closeLadyResultModal()" style="font-size: 18px; padding: 10px 40px;">我已確認</button>
        </div>
    </div>

    <div id="history-container"></div>

    <div style="margin: 40px auto; max-width: 600px; display: flex; gap: 20px; justify-content: center;">
        <button onclick="triggerThreeFails()" class="danger" style="font-size: 18px; padding: 15px 30px; width: 100%;">❌ 三個失敗</button>
        <button onclick="triggerThreeSuccesses()" class="primary" style="font-size: 18px; padding: 15px 30px; width: 100%;">⭕ 三個成功</button>
    </div>

    <button onclick="resetHistory()" style="margin: 20px auto; display: block; background:#6c757d; color:white;">🗑️ 刪除歷史紀錄表</button>

    <script>
        const socket = io();
        let currentInfo = { captain: "", team: [], game_started: false, config: [0, 0], mission_voting_active: false, mission_team: [], voted_members: [], opened_missions: [], lady_of_lake: null, lady_history: [], lady_used_this_quest: false, lady_setup_done: false };
        let selectedRoles = ['梅林', '刺客'];
        let currentPlayers = [];
        let lastPlayersData = []; 
        let revealedRoles = {}; 
        let selectedAssassinationTarget = null; 
        
        // 湖中女神選取變數
        let selectedInitialLady = null; 
        let selectedLadyTarget = null;

        // 任務階段專用變數
        let currentMissionPlayer = "";
        let currentMissionSelection = "";
        let currentMissionPlayerIsGood = false;

        // ====== 拖曳排序功能 ======
        let draggedName = null;

        function dragStart(e) {
            draggedName = e.currentTarget.getAttribute('data-name');
            e.currentTarget.style.opacity = '0.4';
        }
        function dragOver(e) {
            e.preventDefault(); 
            let targetItem = e.target.closest('.player-item');
            if (targetItem && targetItem.getAttribute('data-name') !== draggedName) {
                targetItem.style.boxShadow = "0 -4px 0 #007bff"; 
            }
        }
        function dragLeave(e) {
            let targetItem = e.target.closest('.player-item');
            if (targetItem) targetItem.style.boxShadow = "";
        }
        function drop(e) {
            e.preventDefault();
            let targetItem = e.target.closest('.player-item');
            if (targetItem) {
                targetItem.style.boxShadow = "";
                const targetName = targetItem.getAttribute('data-name');
                if (draggedName && targetName && draggedName !== targetName) {
                    socket.emit('reorder_players', { dragged: draggedName, target: targetName });
                }
            }
        }
        function dragEnd(e) {
            e.currentTarget.style.opacity = '1';
            document.querySelectorAll('.player-item').forEach(item => item.style.boxShadow = "");
        }

        document.getElementById("newPlayerName").addEventListener("keypress", (e) => { 
            if (e.key === "Enter" && !currentInfo.game_started) addPlayer(); 
        });

        function updateButtonStyles() {
            if (currentInfo.mission_voting_active) return;
            
            const cap = currentInfo.captain;
            const team = currentInfo.team;
            
            document.querySelectorAll('.btn-cap').forEach(btn => {
                const name = btn.getAttribute('data-name');
                btn.classList.toggle('active', name === cap);
            });
            document.querySelectorAll('.btn-mission').forEach(btn => {
                const name = btn.getAttribute('data-name');
                btn.classList.toggle('active', team.includes(name));
            });
            
            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.style.display = currentInfo.game_started ? 'none' : 'inline-block';
            });
        }

        function renderPlayerList() {
            currentPlayers = lastPlayersData.map(p => p.name);
            const list = document.getElementById('player-list');
            list.innerHTML = "";
            lastPlayersData.forEach(p => {
                const item = document.createElement('div');
                item.className = "player-item";
                const isApprove = p.vote === '贊成';
                
                let roleHtml = "";
                if (revealedRoles[p.name]) {
                    const r = revealedRoles[p.name];
                    const color = ['刺客', '莫甘娜', '莫德雷德', '奧伯倫', '莫德雷德的爪牙'].includes(r) ? '#dc3545' : '#007bff';
                    roleHtml = `<span style="font-weight:bold; color: ${color}; margin-left: 10px; font-size: 16px;">[${r}]</span>`;
                }
                
                // 動態決定「查看角色 / 湖中女神」的按鈕渲染
                let viewBtnHtml = "";
                if (currentInfo.game_started) {
                    if (!currentInfo.lady_setup_done) {
                        viewBtnHtml = `<button class="btn-view ${p.viewed ? 'btn-disabled' : ''}" 
                                        onclick="viewRole('${p.name}')" 
                                        ${p.viewed ? 'disabled' : ''}>👁️ 查看角色</button>`;
                    } else {
                        if (currentInfo.lady_of_lake === p.name) {
                            // 現任湖中女神
                            let canClick = (currentInfo.quest >= 3) && !currentInfo.lady_used_this_quest;
                            let btnClass = canClick ? "btn-view" : "btn-disabled";
                            let opacity = canClick ? "1" : "0.5";
                            let cursor = canClick ? "pointer" : "not-allowed";
                            let boxShadow = canClick ? "0 0 10px #17a2b8" : "none";
                            viewBtnHtml = `<button class="${btnClass}" onclick="openLadyModal('${p.name}')" ${canClick ? "" : "disabled"} style="opacity: ${opacity}; cursor: ${cursor}; box-shadow: ${boxShadow};">湖中女神</button>`;
                        } else if (currentInfo.lady_history.includes(p.name)) {
                            // 歷史曾當過女神
                            viewBtnHtml = `<button class="btn-disabled" disabled style="opacity: 0.3; cursor: not-allowed;">湖中女神</button>`;
                        } else {
                            // 其他人（顯示透明隱形按鈕防跑版）
                            viewBtnHtml = `<button style="visibility: hidden; padding: 10px 15px; margin: 4px;">湖中女神</button>`;
                        }
                    }
                } else {
                    viewBtnHtml = `<button class="btn-view" style="display: none;">👁️ 查看角色</button>`;
                }

                let controlsHtml = "";

                if (currentInfo.mission_voting_active) {
                    let btnMissionHtml = "";
                    if (currentInfo.mission_team.includes(p.name)) {
                        if (currentInfo.voted_members && currentInfo.voted_members.includes(p.name)) {
                            btnMissionHtml = `<button class="btn-disabled" disabled style="padding:10px 20px; font-size:16px;">✅ 已完成</button>`;
                        } else if (currentInfo.opened_missions && currentInfo.opened_missions.includes(p.name)) {
                            btnMissionHtml = `<button class="btn-disabled" disabled style="padding:10px 20px; font-size:16px; background-color: #17a2b8; color: white;">👀 投票中...</button>`;
                        } else {
                            btnMissionHtml = `<button style="background-color: #fd7e14; color: white; padding:10px 20px; font-size:16px;" onclick="socket.emit('request_mission_modal', '${p.name}')">🚀 按此出任務</button>`;
                        }
                    } else {
                        btnMissionHtml = `<button class="btn-mission btn-disabled" disabled>🛡️ 出任務 (凍結)</button>`;
                    }
                    
                    controlsHtml = `
                        ${viewBtnHtml}
                        <button class="btn-cap btn-disabled" disabled>👑 隊長</button>
                        ${btnMissionHtml}
                        <button class="btn-vote btn-disabled" disabled>${isApprove ? '⭕ 贊成' : '❌ 反對'}</button>
                    `;
                } else {
                    controlsHtml = `
                        ${viewBtnHtml}
                        <button class="btn-cap ${currentInfo.captain === p.name ? 'active' : ''}" 
                                data-name="${p.name}"
                                onclick="socket.emit('toggle_captain', '${p.name}')">👑 隊長</button>
                        <button class="btn-mission ${currentInfo.team.includes(p.name) ? 'active' : ''}" 
                                data-name="${p.name}"
                                onclick="socket.emit('toggle_mission_member', '${p.name}')">🛡️ 出任務</button>
                        <button class="btn-vote ${isApprove ? 'vote-approve' : 'vote-reject'}" 
                                onclick="socket.emit('toggle_vote', '${p.name}')">${isApprove ? '⭕ 贊成' : '❌ 反對'}</button>
                    `;
                }
                
                item.innerHTML = `
                    <button class="btn-delete" onclick="socket.emit('remove_player', '${p.name}')" title="刪除玩家" style="display: ${currentInfo.game_started ? 'none' : 'inline-block'};">🗑️</button>
                    ${roleHtml}
                    <div class="player-name">${p.name}</div>
                    <div>${controlsHtml}</div>`;
                
                item.setAttribute('draggable', 'true');
                item.setAttribute('data-name', p.name);
                item.addEventListener('dragstart', dragStart);
                item.addEventListener('dragover', dragOver);
                item.addEventListener('dragleave', dragLeave);
                item.addEventListener('drop', drop);
                item.addEventListener('dragend', dragEnd);

                list.appendChild(item);
            });
            updateButtonStyles();
        }

        function openRoleModal() {
            if (currentInfo.game_started) {
                if(confirm("要切回設定模式嗎？\n這會重置目前角色的分配，並恢復「查看角色」與新增/刪除玩家的功能。")) {
                    revealedRoles = {}; 
                    socket.emit('toggle_game_state');
                }
                return;
            }
            // --- 註: 由於把頂部資訊區塊拿掉了，現在的人數必須直接算 players ---
            const count = Object.keys(currentInfo.config).length > 0 ? currentPlayers.length : 0; 
            if (count < 5) return alert("人數不足 5 人無法開始！");
            if (!currentInfo.config || currentInfo.config[0] === 0) return alert("遊戲配置數據同步中，請稍候再試或重新整理網頁！");

            const [good, evil] = currentInfo.config;
            document.getElementById('needed-count').innerText = count;
            document.getElementById('good-needed').innerText = good;
            document.getElementById('evil-needed').innerText = evil;
            
            const servantArea = document.getElementById('servant-area');
            const minionArea = document.getElementById('minion-area');
            servantArea.innerHTML = ""; minionArea.innerHTML = "";
            selectedRoles = ['梅林', '刺客']; 

            for(let i=0; i < good-1; i++) {
                const btn = document.createElement('button');
                btn.className = "role-btn role-good";
                btn.innerText = "亞瑟的忠臣";
                btn.onclick = () => toggleServant(btn);
                servantArea.appendChild(btn);
            }
            for(let i=0; i < evil-1; i++) {
                const btn = document.createElement('button');
                btn.className = "role-btn role-evil";
                btn.innerText = "莫德雷德的爪牙";
                btn.onclick = () => toggleMinion(btn);
                minionArea.appendChild(btn);
            }
            updateRoleUI();
            document.getElementById('role-modal').style.display = 'flex';
        }

        function toggleRole(roleName) {
            const [maxGood, maxEvil] = currentInfo.config;
            const isGoodRole = ['派西維爾'].includes(roleName);
            const idx = selectedRoles.indexOf(roleName);
            
            if (idx > -1) {
                selectedRoles.splice(idx, 1);
            } else {
                if (isGoodRole) {
                    const currentGoodCount = 1 + (selectedRoles.includes('派西維爾') ? 1 : 0) + document.querySelectorAll('#servant-area .selected').length;
                    if (currentGoodCount >= maxGood) {
                        const activeServant = document.querySelector('#servant-area .selected');
                        if (activeServant) activeServant.classList.remove('selected');
                        else return alert("好人陣營特殊角色過多，已超過該人數限制！");
                    }
                    selectedRoles.push(roleName);
                } else {
                    const currentEvilCount = 1 + (selectedRoles.includes('莫甘娜') ? 1 : 0) + (selectedRoles.includes('莫德雷德') ? 1 : 0) + (selectedRoles.includes('奧伯倫') ? 1 : 0) + document.querySelectorAll('#minion-area .selected').length;
                    if (currentEvilCount >= maxEvil) {
                        const activeMinion = document.querySelector('#minion-area .selected');
                        if (activeMinion) activeMinion.classList.remove('selected');
                        else return alert("壞人陣營特殊角色過多，已超過該人數限制！");
                    }
                    selectedRoles.push(roleName);
                }
            }
            updateRoleUI();
        }

        function toggleServant(btn) {
            const maxGood = currentInfo.config[0];
            if (!btn.classList.contains('selected')) {
                const currentGoodCount = 1 + (selectedRoles.includes('派西維爾') ? 1 : 0) + document.querySelectorAll('#servant-area .selected').length;
                if (currentGoodCount >= maxGood) return alert("好人人數已達上限，無法再選取亞瑟的忠臣！");
                btn.classList.add('selected');
            } else {
                btn.classList.remove('selected');
            }
            updateRoleUI();
        }

        function toggleMinion(btn) {
            const maxEvil = currentInfo.config[1];
            if (!btn.classList.contains('selected')) {
                const currentEvilCount = 1 + (selectedRoles.includes('莫甘娜') ? 1 : 0) + (selectedRoles.includes('莫德雷德') ? 1 : 0) + (selectedRoles.includes('奧伯倫') ? 1 : 0) + document.querySelectorAll('#minion-area .selected').length;
                if (currentEvilCount >= maxEvil) return alert("壞人人數已達上限，無法再選取莫德雷德的爪牙！");
                btn.classList.add('selected');
            } else {
                btn.classList.remove('selected');
            }
            updateRoleUI();
        }

        function updateRoleUI() {
            document.querySelectorAll('.role-btn').forEach(btn => {
                const name = btn.innerText;
                if (['派西維爾','莫甘娜','莫德雷德','奧伯倫'].includes(name)) {
                    btn.classList.toggle('selected', selectedRoles.includes(name));
                }
            });
            const servantSelected = document.querySelectorAll('#servant-area .selected').length;
            const minionSelected = document.querySelectorAll('#minion-area .selected').length;
            document.getElementById('selected-count').innerText = selectedRoles.length + servantSelected + minionSelected;
        }

        function confirmRoles() {
            const count = currentPlayers.length;
            const servantSelected = Array.from(document.querySelectorAll('#servant-area .selected')).map(() => "亞瑟的忠臣");
            const minionSelected = Array.from(document.querySelectorAll('#minion-area .selected')).map(() => "莫德雷德的爪牙");
            const finalRoles = [...selectedRoles, ...servantSelected, ...minionSelected];
            if (finalRoles.length !== count) return alert("選擇的角色總數與人數不符！");
            
            socket.emit('start_game_with_roles', finalRoles);
            closeRoleModal();
        }
        function closeRoleModal() { document.getElementById('role-modal').style.display = 'none'; }

        function viewRole(name) { socket.emit('view_role', name); }

        socket.on('role_info_result', (data) => {
            document.getElementById('view-name').innerText = data.name;
            document.getElementById('view-role').innerText = data.role;
            document.getElementById('view-info').innerText = data.info;
            document.getElementById('view-role-modal').style.display = 'flex';
        });
        function closeViewModal() { document.getElementById('view-role-modal').style.display = 'none'; }

        socket.on('update_game_info', (info) => {
            currentInfo = info;
            
            const toggleBtn = document.getElementById('toggleGameBtn');
            const setupLadyBtn = document.getElementById('setupLadyBtn');
            const input = document.getElementById('newPlayerName');
            const addBtn = document.getElementById('addPlayerBtn');

            if (info.game_started) {
                input.disabled = true; input.style.backgroundColor = '#e9ecef';
                addBtn.disabled = true; addBtn.className = 'btn-disabled';
                toggleBtn.innerText = "🔄 重新設定角色"; toggleBtn.style.backgroundColor = "#ffc107"; toggleBtn.style.color = "#212529";
                
                if (!info.lady_setup_done) {
                    setupLadyBtn.style.display = 'inline-block';
                } else {
                    setupLadyBtn.style.display = 'none';
                }
            } else {
                revealedRoles = {}; 
                input.disabled = false; input.style.backgroundColor = 'white';
                addBtn.disabled = false; addBtn.className = 'primary';
                toggleBtn.innerText = "🚀 遊戲開始"; toggleBtn.style.backgroundColor = "#28a745"; toggleBtn.style.color = "white";
                setupLadyBtn.style.display = 'none';
            }
            renderPlayerList();
        });

        socket.on('update_status', (players) => {
            lastPlayersData = players;
            renderPlayerList();
        });

        function addPlayer() {
            if (currentInfo.game_started) return;
            const input = document.getElementById('newPlayerName');
            const name = input.value.trim();
            if (!name) return;
            socket.emit('add_player', name);
            input.value = "";
        }

        function submitRound() {
            if (currentInfo.mission_voting_active) return alert("任務執行中，無法進行此操作！");
            if (currentInfo.captain === "尚未設定" || currentInfo.team.length === 0) return alert("請先選定隊長與隊員！");
            if (confirm("確定要紀錄本次投票結果嗎？\n按下確認後將會鎖定版面進行出任務。")) socket.emit('submit_round');
        }

        socket.on('open_mission_modal', (data) => {
            currentMissionPlayer = data.name;
            currentMissionPlayerIsGood = data.is_good;
            currentMissionSelection = "";
            
            document.getElementById('pm-name').innerText = currentMissionPlayer;
            document.getElementById('pm-selection-text').innerText = "尚未選擇";
            document.getElementById('pm-selection-text').style.color = "#666";
            
            document.getElementById('pm-success-btn').style.border = "2px solid transparent";
            document.getElementById('pm-success-btn').style.transform = "scale(1)";
            document.getElementById('pm-fail-btn').style.border = "2px solid transparent";
            document.getElementById('pm-fail-btn').style.transform = "scale(1)";
            
            document.getElementById('personal-mission-modal').style.display = 'flex';
        });

        function selectPersonalVote(vote) {
            if (vote === '失敗' && currentMissionPlayerIsGood) return;
            
            currentMissionSelection = vote;
            const succBtn = document.getElementById('pm-success-btn');
            const failBtn = document.getElementById('pm-fail-btn');
            
            if (vote === '成功') {
                succBtn.style.border = "4px solid #000"; succBtn.style.transform = "scale(1.1)";
                failBtn.style.border = "2px solid transparent"; failBtn.style.transform = "scale(1)";
                document.getElementById('pm-selection-text').innerText = "已選擇：成功";
                document.getElementById('pm-selection-text').style.color = "#28a745";
            } else {
                failBtn.style.border = "4px solid #000"; failBtn.style.transform = "scale(1.1)";
                succBtn.style.border = "2px solid transparent"; succBtn.style.transform = "scale(1)";
                document.getElementById('pm-selection-text').innerText = "已選擇：失敗";
                document.getElementById('pm-selection-text').style.color = "#dc3545";
            }
        }

        function submitPersonalVote() {
            if (!currentMissionSelection) return alert("請先選擇成功或失敗！");
            
            socket.emit('submit_individual_mission_vote', {
                name: currentMissionPlayer,
                vote: currentMissionSelection
            });
            document.getElementById('personal-mission-modal').style.display = 'none';
        }

        let missionResultTimeout;
        socket.on('mission_result_animation', (data) => {
            const modal = document.getElementById('mission-result-modal');
            const title = document.getElementById('mission-result-title');
            const desc = document.getElementById('mission-result-desc');
            const box = document.getElementById('mission-result-box');
            
            if (data.fails === 0) {
                title.innerText = "🎉 任務成功！ 🎉";
                title.style.color = "#28a745";
                box.style.boxShadow = "0 0 50px rgba(40,167,69,0.9)";
            } else {
                title.innerText = "💥 任務失敗！ 💥";
                title.style.color = "#dc3545";
                box.style.boxShadow = "0 0 50px rgba(220,53,69,0.9)";
            }
            desc.innerText = data.message;
            modal.style.display = 'flex';

            clearTimeout(missionResultTimeout);
            missionResultTimeout = setTimeout(() => {
                modal.style.display = 'none';
            }, 1000);
        });

        function resetHistory() { 
            if(confirm("確定要刪除所有歷史紀錄嗎？\n(玩家名單將保留，且會切回「未開始」狀態)")) {
                revealedRoles = {};
                document.getElementById('history-container').innerHTML = ""; 
                socket.emit('reset_history'); 
            }
        }

        function triggerThreeFails() {
            if (!currentInfo.game_started) return alert("遊戲尚未開始！");
            if(confirm("確定宣告「三個失敗」嗎？\n壞人獲勝，系統將會攤牌顯示所有人身分。")) socket.emit('three_fails');
        }

        function triggerThreeSuccesses() {
            if (!currentInfo.game_started) return alert("遊戲尚未開始！");
            if(confirm("確定宣告「三個成功」嗎？\n系統將進入刺殺階段。")) socket.emit('three_successes');
        }

        socket.on('reveal_all_roles', (roles) => {
            revealedRoles = roles;
            renderPlayerList();
        });

        socket.on('trigger_assassination', (data) => {
            const overlay = document.getElementById('assassination-modal');
            const evilInfoDiv = document.getElementById('evil-info');
            const targetsDiv = document.getElementById('good-targets');
            
            let evilText = "壞人陣營身分：<br>";
            for (const [name, role] of Object.entries(data.evil_info)) evilText += `${name} (${role})&nbsp;&nbsp;`;
            evilInfoDiv.innerHTML = evilText;

            targetsDiv.innerHTML = "";
            selectedAssassinationTarget = null;

            data.good_players.forEach(name => {
                const btn = document.createElement('button');
                btn.className = "role-btn role-good";
                btn.innerText = name;
                btn.style.padding = "10px";
                btn.onclick = () => {
                    document.querySelectorAll('#good-targets .role-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedAssassinationTarget = name;
                };
                targetsDiv.appendChild(btn);
            });
            overlay.style.display = 'flex';
        });

        function confirmAssassination() {
            if (!selectedAssassinationTarget) return alert("請先選擇一位好人作為刺殺目標！");
            if (confirm(`確定要刺殺 ${selectedAssassinationTarget} 嗎？`)) {
                socket.emit('submit_assassination', selectedAssassinationTarget);
                closeAssassinationModal();
            }
        }
        function closeAssassinationModal() { document.getElementById('assassination-modal').style.display = 'none'; }
        socket.on('assassination_result', (data) => { alert((data.is_evil_win ? "💀 " : "🎉 ") + data.message); });

        // --- 湖中女神邏輯處理 ---
        function openInitialLadyModal() {
            const area = document.getElementById('initial-lady-options');
            area.innerHTML = "";
            selectedInitialLady = null;
            
            currentPlayers.forEach(name => {
                const btn = document.createElement('button');
                btn.className = "role-btn"; 
                btn.style.padding = "10px 20px";
                btn.style.fontSize = "16px";
                btn.style.width = "auto";
                btn.style.minWidth = "100px";
                btn.innerText = name;
                
                btn.onclick = () => {
                    document.querySelectorAll('#initial-lady-options .role-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedInitialLady = name;
                };
                area.appendChild(btn);
            });
            document.getElementById('initial-lady-modal').style.display = 'flex';
        }

        function confirmInitialLady() {
            if (!selectedInitialLady) {
                return alert("請先選取一位玩家！");
            }
            socket.emit('set_initial_lady', selectedInitialLady);
            closeInitialLadyModal();
        }

        function closeInitialLadyModal() {
            document.getElementById('initial-lady-modal').style.display = 'none';
        }

        function openLadyModal(checker) {
            if (currentInfo.quest < 3) return alert("第二次任務結束後（第三回合開始）才可以使用湖中女神！");
            if (currentInfo.lady_used_this_quest) return alert("本回合已經使用過湖中女神！出完下次任務後才能再次驗人。");
            
            const area = document.getElementById('lady-target-options');
            area.innerHTML = "";
            selectedLadyTarget = null; 
            
            document.getElementById('confirm-lady-btn').onclick = () => confirmLadyAction(checker);

            let hasValidTarget = false;
            currentPlayers.forEach(p => {
                if (p !== checker && !currentInfo.lady_history.includes(p) && currentInfo.lady_of_lake !== p) {
                    hasValidTarget = true;
                    const btn = document.createElement('button');
                    btn.className = "role-btn"; 
                    btn.style.padding = "10px 20px";
                    btn.style.fontSize = "16px";
                    btn.style.width = "auto";
                    btn.style.minWidth = "100px";
                    btn.innerText = p;
                    
                    btn.onclick = () => {
                        document.querySelectorAll('#lady-target-options .role-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        selectedLadyTarget = p;
                    };
                    area.appendChild(btn);
                }
            });

            if (!hasValidTarget) {
                area.innerHTML = "<p style='color:#666;'>沒有可供查驗的對象了！</p>";
                document.getElementById('confirm-lady-btn').style.display = 'none';
            } else {
                document.getElementById('confirm-lady-btn').style.display = 'inline-block';
            }

            document.getElementById('lady-modal').style.display = 'flex';
        }

        function confirmLadyAction(checker) {
            if (!selectedLadyTarget) {
                return alert("請先選取一位玩家！");
            }
            socket.emit('use_lady_check', { checker: checker, target: selectedLadyTarget });
            closeLadyModal();
        }

        function closeLadyModal() {
            document.getElementById('lady-modal').style.display = 'none';
        }

        socket.on('lady_check_result', (data) => {
            document.getElementById('lady-result-target').innerText = data.target;
            document.getElementById('lady-result-alignment').innerText = data.alignment;
            document.getElementById('lady-result-modal').style.display = 'flex';
        });

        function closeLadyResultModal() {
            document.getElementById('lady-result-modal').style.display = 'none';
        }

        socket.on('update_history', (data) => {
            const container = document.getElementById('history-container');
            container.innerHTML = ""; 
            const records = data.history;
            const outcomes = data.outcomes;
            if (records.length === 0) return;

            let allNames = [];
            currentPlayers.forEach(n => { if (!allNames.includes(n)) allNames.push(n); });
            records.forEach(r => { Object.keys(r.votes).forEach(n => { if (!allNames.includes(n)) allNames.push(n); }); });

            const quests = [...new Set(records.map(r => r.quest))].sort((a, b) => a - b);
            
            quests.forEach(qNum => {
                const qDiv = document.createElement('div');
                qDiv.className = "quest-table-container";
                qDiv.innerHTML = `<h4>第 ${qNum} 局任務</h4>`;
                const table = document.createElement('table');
                
                table.innerHTML = `<tr><th>次數</th><th>提議</th>` + allNames.map(n => `<th>${n}</th>`).join("") + `</tr>`;

                records.filter(r => r.quest === qNum).forEach(r => {
                    const row = document.createElement('tr');
                    let cols = `<td>A${r.attempt}</td><td style="color:${r.is_approved?'#28a745':'#dc3545'}; font-weight:bold;">${r.is_approved?'通過':'失敗'}</td>`;
                    allNames.forEach(n => {
                        const v = r.votes[n];
                        if (v === undefined) {
                            cols += `<td style="background:#eee; color:#ccc;">-</td>`;
                        } else {
                            const icon = (n === r.captain ? "👑" : "") + (r.team.includes(n) ? "🛡️" : "");
                            cols += `<td style="background:${v==='贊成'?'#fff':'#adb5bd'}; font-size:16px;">${icon}</td>`;
                        }
                    });
                    row.innerHTML = cols;
                    table.appendChild(row);
                });
                qDiv.appendChild(table);

                if (outcomes[qNum]) {
                    const resBar = document.createElement('div');
                    resBar.className = "mission-summary-bar";
                    resBar.innerHTML = `<span>任務結果：</span>`;
                    outcomes[qNum].forEach(res => {
                        const icon = document.createElement('span');
                        icon.innerHTML = (res === "成功") ? "⭕" : "❌";
                        icon.className = (res === "成功") ? "icon-success" : "icon-fail";
                        resBar.appendChild(icon);
                    });
                    qDiv.appendChild(resBar);
                }
                container.appendChild(qDiv);
            });
        });
    </script>
</body>
</html>
